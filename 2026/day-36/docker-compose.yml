services:
  app:
    build: ./flask-todo-app
    ports:
      - "5002:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - todo-network
    labels:
      - "project=todo-app"
      - "component=api"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - todo-db-data:/var/lib/postgresql/data
    restart: always
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "project=todo-app"
      - "component=database"

networks:
  todo-network:
    driver: bridge

volumes:
  todo-db-data:
